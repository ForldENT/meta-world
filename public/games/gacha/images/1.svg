<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </radialGradient>
    <radialGradient id="body1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FF8C69"/>
      <stop offset="60%" stop-color="#FF5722"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </radialGradient>
    <radialGradient id="face1" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFCCBC"/>
      <stop offset="100%" stop-color="#FFAB91"/>
    </radialGradient>
    <radialGradient id="flameG" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="50%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#FF5722"/>
    </radialGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bg1)" opacity="0.6"/>

  <!-- Flames on head (fire type!) -->
  <g filter="url(#glow1)">
    <ellipse cx="100" cy="42" rx="10" ry="18" fill="#FFEB3B" opacity="0.9"/>
    <ellipse cx="100" cy="38" rx="6" ry="14" fill="#FF9800"/>
    <ellipse cx="100" cy="34" rx="3" ry="10" fill="#FF5722"/>
    <!-- side flames -->
    <ellipse cx="84" cy="52" rx="7" ry="13" fill="#FF9800" opacity="0.85" transform="rotate(-20,84,52)"/>
    <ellipse cx="116" cy="52" rx="7" ry="13" fill="#FF9800" opacity="0.85" transform="rotate(20,116,52)"/>
    <ellipse cx="84" cy="49" rx="4" ry="9" fill="#FFEB3B" transform="rotate(-20,84,49)"/>
    <ellipse cx="116" cy="49" rx="4" ry="9" fill="#FFEB3B" transform="rotate(20,116,49)"/>
  </g>

  <!-- Body (round, bear-like) -->
  <ellipse cx="100" cy="128" rx="42" ry="40" fill="url(#body1)" filter="url(#softShadow)"/>

  <!-- Arms -->
  <ellipse cx="64" cy="130" rx="14" ry="10" fill="#FF5722" transform="rotate(-30,64,130)"/>
  <ellipse cx="136" cy="130" rx="14" ry="10" fill="#FF5722" transform="rotate(30,136,130)"/>

  <!-- Hands (round paws) -->
  <circle cx="53" cy="140" r="10" fill="#FF8C69"/>
  <circle cx="147" cy="140" r="10" fill="#FF8C69"/>

  <!-- Legs -->
  <ellipse cx="82" cy="162" rx="14" ry="10" fill="#FF5722"/>
  <ellipse cx="118" cy="162" rx="14" ry="10" fill="#FF5722"/>
  <!-- Feet -->
  <ellipse cx="80" cy="170" rx="13" ry="8" fill="#FF8C69"/>
  <ellipse cx="120" cy="170" rx="13" ry="8" fill="#FF8C69"/>

  <!-- Head -->
  <circle cx="100" cy="90" r="36" fill="url(#body1)" filter="url(#softShadow)"/>
  <!-- Face patch -->
  <ellipse cx="100" cy="94" rx="24" ry="20" fill="url(#face1)"/>

  <!-- Ears -->
  <circle cx="66" cy="72" r="12" fill="#FF5722"/>
  <circle cx="66" cy="72" r="7" fill="#FFAB91"/>
  <circle cx="134" cy="72" r="12" fill="#FF5722"/>
  <circle cx="134" cy="72" r="7" fill="#FFAB91"/>

  <!-- Eyes -->
  <circle cx="90" cy="86" r="8" fill="white"/>
  <circle cx="110" cy="86" r="8" fill="white"/>
  <circle cx="92" cy="87" r="5" fill="#3E2723"/>
  <circle cx="112" cy="87" r="5" fill="#3E2723"/>
  <!-- Eye shine -->
  <circle cx="93" cy="85" r="2" fill="white"/>
  <circle cx="113" cy="85" r="2" fill="white"/>

  <!-- Blush -->
  <ellipse cx="80" cy="96" rx="9" ry="6" fill="#FF8A65" opacity="0.5"/>
  <ellipse cx="120" cy="96" rx="9" ry="6" fill="#FF8A65" opacity="0.5"/>

  <!-- Nose -->
  <ellipse cx="100" cy="96" rx="5" ry="3.5" fill="#BF360C"/>

  <!-- Smile -->
  <path d="M90 103 Q100 112 110 103" stroke="#BF360C" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Hot pepper tail -->
  <path d="M142 150 Q162 140 158 122 Q155 108 148 115" stroke="#FF5722" stroke-width="5" fill="none" stroke-linecap="round"/>
  <ellipse cx="148" cy="116" rx="5" ry="8" fill="#FF1744" transform="rotate(-30,148,116)"/>

  <!-- Tiny flame sparkles -->
  <circle cx="70" cy="58" r="3" fill="#FFEB3B" opacity="0.8"/>
  <circle cx="130" cy="55" r="2.5" fill="#FF9800" opacity="0.8"/>
  <circle cx="60" cy="70" r="2" fill="#FFEB3B" opacity="0.6"/>
</svg>
