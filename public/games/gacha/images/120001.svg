<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg13" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </radialGradient>
    <radialGradient id="body13" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFCC80"/>
      <stop offset="55%" stop-color="#FFA726"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <radialGradient id="bread" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="50%" stop-color="#FFCC80"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>
    <filter id="breadGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="drop13">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="rgba(230,81,0,0.2)"/>
    </filter>
  </defs>

  <circle cx="100" cy="100" r="90" fill="url(#bg13)" opacity="0.55"/>

  <!-- Bread bun head shape bumps -->
  <circle cx="78" cy="66" r="16" fill="url(#bread)" filter="url(#drop13)"/>
  <circle cx="100" cy="60" r="18" fill="url(#bread)" filter="url(#drop13)"/>
  <circle cx="122" cy="66" r="16" fill="url(#bread)" filter="url(#drop13)"/>
  <!-- Bun seam lines -->
  <path d="M84 72 Q100 66 116 72" stroke="#FF8F00" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Bear/dog body -->
  <ellipse cx="100" cy="130" rx="44" ry="41" fill="url(#body13)" filter="url(#drop13)"/>
  <!-- tummy lighter -->
  <ellipse cx="100" cy="130" rx="27" ry="28" fill="#FFE0B2" opacity="0.75"/>
  <!-- sesame seeds on tummy -->
  <ellipse cx="94" cy="118" rx="2.5" ry="1.5" fill="#E65100" opacity="0.4" transform="rotate(-20,94,118)"/>
  <ellipse cx="102" cy="115" rx="2.5" ry="1.5" fill="#E65100" opacity="0.4" transform="rotate(15,102,115)"/>
  <ellipse cx="109" cy="119" rx="2.5" ry="1.5" fill="#E65100" opacity="0.4" transform="rotate(-10,109,119)"/>
  <ellipse cx="96" cy="126" rx="2.5" ry="1.5" fill="#E65100" opacity="0.4" transform="rotate(25,96,126)"/>
  <ellipse cx="105" cy="128" rx="2.5" ry="1.5" fill="#E65100" opacity="0.4"/>

  <!-- Arms -->
  <ellipse cx="62" cy="126" rx="14" ry="11" fill="#FFA726" transform="rotate(-25,62,126)"/>
  <ellipse cx="138" cy="126" rx="14" ry="11" fill="#FFA726" transform="rotate(25,138,126)"/>
  <circle cx="51" cy="137" r="11" fill="#FFCC80"/>
  <circle cx="149" cy="137" r="11" fill="#FFCC80"/>

  <!-- Legs -->
  <ellipse cx="82" cy="164" rx="15" ry="10" fill="#FFA726"/>
  <ellipse cx="118" cy="164" rx="15" ry="10" fill="#FFA726"/>
  <ellipse cx="80" cy="172" rx="14" ry="8" fill="#FFCC80"/>
  <ellipse cx="120" cy="172" rx="14" ry="8" fill="#FFCC80"/>

  <!-- Head (bread bun shape) -->
  <ellipse cx="100" cy="93" rx="38" ry="32" fill="url(#bread)" filter="url(#drop13)"/>
  <!-- Face patch -->
  <ellipse cx="100" cy="97" rx="24" ry="20" fill="#FFE0B2" opacity="0.8"/>
  <!-- Bread score lines (like real bread) -->
  <path d="M72 84 Q100 80 128 84" stroke="#FF8F00" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Round dog ears -->
  <ellipse cx="68" cy="70" rx="12" ry="10" fill="#FFA726"/>
  <ellipse cx="132" cy="70" rx="12" ry="10" fill="#FFA726"/>

  <!-- Sesame seeds on head -->
  <ellipse cx="85" cy="77" rx="2" ry="1.2" fill="#E65100" opacity="0.35" transform="rotate(-20,85,77)"/>
  <ellipse cx="95" cy="73" rx="2" ry="1.2" fill="#E65100" opacity="0.35" transform="rotate(10,95,73)"/>
  <ellipse cx="105" cy="73" rx="2" ry="1.2" fill="#E65100" opacity="0.35" transform="rotate(-5,105,73)"/>
  <ellipse cx="115" cy="77" rx="2" ry="1.2" fill="#E65100" opacity="0.35" transform="rotate(20,115,77)"/>

  <!-- Eyes -->
  <circle cx="88" cy="89" r="8.5" fill="white"/>
  <circle cx="112" cy="89" r="8.5" fill="white"/>
  <circle cx="90" cy="90" r="5.5" fill="#4E342E"/>
  <circle cx="114" cy="90" r="5.5" fill="#4E342E"/>
  <circle cx="91.5" cy="88" r="2.5" fill="white"/>
  <circle cx="115.5" cy="88" r="2.5" fill="white"/>

  <!-- Blush -->
  <ellipse cx="77" cy="99" rx="10" ry="6" fill="#FFAB91" opacity="0.55"/>
  <ellipse cx="123" cy="99" rx="10" ry="6" fill="#FFAB91" opacity="0.55"/>

  <!-- Nose -->
  <ellipse cx="100" cy="99" rx="5" ry="3.5" fill="#4E342E"/>
  <path d="M91 106 Q100 114 109 106" stroke="#4E342E" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Butter pat on head -->
  <rect x="88" y="66" width="24" height="8" rx="4" fill="#FFF59D" opacity="0.8" filter="url(#breadGlow)"/>
  <rect x="90" y="67" width="20" height="3" rx="2" fill="white" opacity="0.5"/>

  <!-- Steam wisps -->
  <path d="M76 56 Q78 50 76 44" stroke="#FFCC80" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M100 50 Q102 44 100 38" stroke="#FFCC80" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M124 56 Q122 50 124 44" stroke="#FFCC80" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
