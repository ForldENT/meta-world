<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </radialGradient>
    <radialGradient id="body5" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="50%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#006064"/>
    </radialGradient>
    <radialGradient id="face5" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </radialGradient>
    <filter id="iceGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="drop5">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="rgba(0,96,100,0.2)"/>
    </filter>
  </defs>

  <circle cx="100" cy="100" r="90" fill="url(#bg5)" opacity="0.55"/>

  <!-- Snowflake / ice crystal on head -->
  <g filter="url(#iceGlow)" transform="translate(100,48)">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#B2EBF2" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#B2EBF2" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#B2EBF2" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#B2EBF2" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="4" fill="white"/>
    <!-- branch tips -->
    <line x1="-5" y1="-11" x2="-9" y2="-7" stroke="#80DEEA" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="-11" x2="9" y2="-7" stroke="#80DEEA" stroke-width="2" stroke-linecap="round"/>
    <line x1="11" y1="-5" x2="7" y2="-9" stroke="#80DEEA" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Body -->
  <ellipse cx="100" cy="130" rx="42" ry="40" fill="url(#body5)" filter="url(#drop5)"/>
  <!-- Ice crystal belly pattern -->
  <ellipse cx="100" cy="130" rx="26" ry="27" fill="url(#face5)" opacity="0.85"/>
  <!-- Crystal detail -->
  <polygon points="100,112 105,120 100,128 95,120" fill="#B2EBF2" opacity="0.5"/>
  <polygon points="100,128 106,135 100,142 94,135" fill="#80DEEA" opacity="0.4"/>

  <!-- Arms -->
  <ellipse cx="62" cy="128" rx="13" ry="10" fill="#80DEEA" transform="rotate(-25,62,128)"/>
  <ellipse cx="138" cy="128" rx="13" ry="10" fill="#80DEEA" transform="rotate(25,138,128)"/>
  <!-- Ice crystal paws -->
  <circle cx="52" cy="138" r="10" fill="#E0F7FA"/>
  <circle cx="148" cy="138" r="10" fill="#E0F7FA"/>
  <!-- tiny crystals on paws -->
  <polygon points="52,130 54,135 52,140 50,135" fill="#80DEEA" opacity="0.6"/>
  <polygon points="148,130 150,135 148,140 146,135" fill="#80DEEA" opacity="0.6"/>

  <!-- Legs -->
  <ellipse cx="82" cy="163" rx="14" ry="9" fill="#80DEEA"/>
  <ellipse cx="118" cy="163" rx="14" ry="9" fill="#80DEEA"/>
  <ellipse cx="80" cy="171" rx="13" ry="7" fill="#E0F7FA"/>
  <ellipse cx="120" cy="171" rx="13" ry="7" fill="#E0F7FA"/>

  <!-- Head -->
  <circle cx="100" cy="90" r="36" fill="url(#body5)" filter="url(#drop5)"/>
  <ellipse cx="100" cy="95" rx="22" ry="19" fill="url(#face5)"/>

  <!-- Round polar bear ears -->
  <circle cx="70" cy="67" r="13" fill="#80DEEA"/>
  <circle cx="70" cy="67" r="8" fill="#E0F7FA"/>
  <circle cx="130" cy="67" r="13" fill="#80DEEA"/>
  <circle cx="130" cy="67" r="8" fill="#E0F7FA"/>

  <!-- Eyes — icy blue -->
  <circle cx="88" cy="87" r="8.5" fill="white"/>
  <circle cx="112" cy="87" r="8.5" fill="white"/>
  <circle cx="90" cy="88" r="5.5" fill="#0097A7"/>
  <circle cx="114" cy="88" r="5.5" fill="#0097A7"/>
  <circle cx="91" cy="86" r="2.5" fill="white"/>
  <circle cx="115" cy="86" r="2.5" fill="white"/>

  <!-- Blush — icy -->
  <ellipse cx="78" cy="98" rx="9" ry="6" fill="#80DEEA" opacity="0.55"/>
  <ellipse cx="122" cy="98" rx="9" ry="6" fill="#80DEEA" opacity="0.55"/>

  <!-- Nose -->
  <ellipse cx="100" cy="97" rx="4" ry="3" fill="#006064"/>
  <path d="M91 104 Q100 112 109 104" stroke="#006064" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Floating snowflakes -->
  <g filter="url(#iceGlow)" opacity="0.7">
    <line x1="57" y1="103" x2="57" y2="113" stroke="#B2EBF2" stroke-width="2"/>
    <line x1="52" y1="108" x2="62" y2="108" stroke="#B2EBF2" stroke-width="2"/>
    <line x1="54" y1="105" x2="60" y2="111" stroke="#B2EBF2" stroke-width="2"/>
    <line x1="60" y1="105" x2="54" y2="111" stroke="#B2EBF2" stroke-width="2"/>
    <line x1="142" y1="100" x2="142" y2="110" stroke="#B2EBF2" stroke-width="2"/>
    <line x1="137" y1="105" x2="147" y2="105" stroke="#B2EBF2" stroke-width="2"/>
    <line x1="139" y1="102" x2="145" y2="108" stroke="#B2EBF2" stroke-width="2"/>
    <line x1="145" y1="102" x2="139" y2="108" stroke="#B2EBF2" stroke-width="2"/>
  </g>
</svg>
