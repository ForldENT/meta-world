<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg17" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </radialGradient>
    <radialGradient id="body17" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#80CBC4"/>
      <stop offset="55%" stop-color="#009688"/>
      <stop offset="100%" stop-color="#004D40"/>
    </radialGradient>
    <radialGradient id="fish" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#B2EBF2"/>
      <stop offset="50%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </radialGradient>
    <filter id="seaGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="drop17">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="rgba(0,77,64,0.25)"/>
    </filter>
  </defs>

  <!-- Sea bg -->
  <circle cx="100" cy="100" r="90" fill="url(#bg17)" opacity="0.55"/>
  <!-- Wave hints -->
  <path d="M20 130 Q40 120 60 130 Q80 140 100 130 Q120 120 140 130 Q160 140 180 130" stroke="#80CBC4" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M20 145 Q40 135 60 145 Q80 155 100 145 Q120 135 140 145 Q160 155 180 145" stroke="#80CBC4" stroke-width="1.5" fill="none" opacity="0.2"/>

  <!-- Fish tail -->
  <path d="M138 150 Q165 138 163 155 Q165 174 138 163 Z" fill="url(#fish)"/>
  <line x1="149" y1="155" x2="163" y2="152" stroke="#0097A7" stroke-width="1.5" opacity="0.5"/>
  <line x1="147" y1="160" x2="163" y2="160" stroke="#0097A7" stroke-width="1.5" opacity="0.5"/>

  <!-- Body (otter-like) -->
  <ellipse cx="100" cy="130" rx="42" ry="40" fill="url(#body17)" filter="url(#drop17)"/>
  <!-- Tummy -->
  <ellipse cx="100" cy="132" rx="26" ry="27" fill="#E0F2F1" opacity="0.8"/>
  <!-- Tummy fish scale pattern -->
  <g opacity="0.2" fill="#009688">
    <ellipse cx="91" cy="118" rx="7" ry="5" transform="rotate(-10,91,118)"/>
    <ellipse cx="105" cy="116" rx="7" ry="5" transform="rotate(10,105,116)"/>
    <ellipse cx="92" cy="128" rx="7" ry="5"/>
    <ellipse cx="108" cy="128" rx="7" ry="5"/>
    <ellipse cx="100" cy="138" rx="7" ry="5"/>
  </g>

  <!-- Arms with fins -->
  <ellipse cx="62" cy="124" rx="14" ry="10" fill="#009688" transform="rotate(-25,62,124)"/>
  <!-- fin detail -->
  <path d="M54 128 Q50 118 58 115" stroke="#80CBC4" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="138" cy="124" rx="14" ry="10" fill="#009688" transform="rotate(25,138,124)"/>
  <path d="M146 128 Q150 118 142 115" stroke="#80CBC4" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="51" cy="134" r="10" fill="#80CBC4"/>
  <circle cx="149" cy="134" r="10" fill="#80CBC4"/>

  <!-- Legs -->
  <ellipse cx="82" cy="163" rx="14" ry="9" fill="#009688"/>
  <ellipse cx="118" cy="163" rx="14" ry="9" fill="#009688"/>
  <ellipse cx="80" cy="171" rx="13" ry="8" fill="#80CBC4"/>
  <ellipse cx="120" cy="171" rx="13" ry="8" fill="#80CBC4"/>

  <!-- Head -->
  <circle cx="100" cy="90" r="36" fill="url(#body17)" filter="url(#drop17)"/>
  <ellipse cx="100" cy="95" rx="22" ry="19" fill="#E0F2F1" opacity="0.8"/>

  <!-- Round otter ears -->
  <circle cx="70" cy="68" r="12" fill="#009688"/>
  <circle cx="70" cy="68" r="7" fill="#80CBC4"/>
  <circle cx="130" cy="68" r="12" fill="#009688"/>
  <circle cx="130" cy="68" r="7" fill="#80CBC4"/>

  <!-- Holding a fish! -->
  <g transform="translate(38,130) rotate(-30)">
    <ellipse cx="0" cy="0" rx="16" ry="9" fill="url(#fish)"/>
    <path d="M-10 -4 Q-16 0 -10 4" stroke="#0097A7" stroke-width="1.5" fill="none"/>
    <path d="M-8 -3 Q-14 0 -8 3" stroke="#4DD0E1" stroke-width="1" fill="none"/>
    <!-- fin -->
    <path d="M2 -9 Q6 0 2 9 Q-2 0 2 -9Z" fill="#80DEEA" opacity="0.8"/>
    <!-- tail -->
    <path d="M16 0 Q22 -7 24 0 Q22 7 16 0Z" fill="#0097A7"/>
    <!-- eye -->
    <circle cx="-4" cy="-2" r="2.5" fill="white"/>
    <circle cx="-3.5" cy="-2" r="1.5" fill="#004D40"/>
  </g>

  <!-- Eyes — happy squint -->
  <circle cx="88" cy="87" r="8.5" fill="white"/>
  <circle cx="112" cy="87" r="8.5" fill="white"/>
  <circle cx="90" cy="88" r="5.5" fill="#004D40"/>
  <circle cx="114" cy="88" r="5.5" fill="#004D40"/>
  <circle cx="91.5" cy="86" r="2.5" fill="white"/>
  <circle cx="115.5" cy="86" r="2.5" fill="white"/>

  <!-- Blush -->
  <ellipse cx="78" cy="98" rx="9" ry="6" fill="#80CBC4" opacity="0.55"/>
  <ellipse cx="122" cy="98" rx="9" ry="6" fill="#80CBC4" opacity="0.55"/>

  <!-- Nose -->
  <ellipse cx="100" cy="97" rx="5" ry="3.5" fill="#004D40"/>
  <path d="M91 104 Q100 112 109 104" stroke="#004D40" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Bubbles floating -->
  <g filter="url(#seaGlow)" opacity="0.7">
    <circle cx="62" cy="105" r="5" fill="none" stroke="#80DEEA" stroke-width="1.5"/>
    <circle cx="62" cy="105" r="2" fill="#B2EBF2" opacity="0.4"/>
    <circle cx="138" cy="102" r="4" fill="none" stroke="#80DEEA" stroke-width="1.5"/>
    <circle cx="138" cy="102" r="1.5" fill="#B2EBF2" opacity="0.4"/>
    <circle cx="68" cy="92" r="3" fill="none" stroke="#4DD0E1" stroke-width="1.5"/>
  </g>
</svg>
