# render.yaml — Render Blueprint
# 이 파일이 있으면 Render에서 New + → Blueprint 로 한 번에 배포할 수 있습니다.
services:
  - type: web
    name: meta-world
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false      # 대시보드에서 직접 입력 (비밀값)
      - key: JWT_SECRET
        sync: false      # 대시보드에서 직접 입력 (비밀값)
      - key: NODE_VERSION
        value: 20
